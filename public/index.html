<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 기반 세탁건조기 레이아웃 최적화</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f8fafc;color:#1e293b;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:500px;text-align:center}
h1{font-size:28px;font-weight:900;background:linear-gradient(135deg,#2563EB,#7C3AED,#DB2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sub{font-size:13px;color:#64748b;margin-bottom:32px}
.cards{display:flex;flex-direction:column;gap:12px}
a{text-decoration:none}
.card{padding:24px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .2s;cursor:pointer}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#93C5FD}
.card .icon{font-size:32px;margin-bottom:8px}
.card .title{font-size:16px;font-weight:700;color:#1e293b;margin-bottom:4px}
.card .desc{font-size:12px;color:#64748b;line-height:1.5}
.footer{margin-top:24px;font-size:10px;color:#94a3b8}
</style>
</head>
<body>
<div class="container">
  <h1>AI 레이아웃 최적화</h1>
  <div class="sub">세탁건조기 캐비닛 내 컴포넌트 배치 최적화</div>
  <div class="cards">
    <a href="/tutorial.html">
      <div class="card">
        <div class="icon">🤖</div>
        <div class="title">RL & Diffusion 시연 튜토리얼</div>
        <div class="desc">강화학습(Hill Climbing)과 Diffusion(다중 패턴 생성)의<br>학습 과정을 인터랙티브하게 체험</div>
      </div>
    </a>
    <a href="/roadmap.html">
      <div class="card">
        <div class="icon">📋</div>
        <div class="title">개발 로드맵</div>
        <div class="desc">RL+GNN · Diffusion+Transformer · 멀티피직스 보상<br>sLLM 설계 지원 · 전문가 검토 루프 — 15개월 로드맵</div>
      </div>
    </a>
  </div>
  <div class="footer">건조기선행연구팀 · 2026</div>
</div>
</body>
</html>
