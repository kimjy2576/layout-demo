function drawTrackListColumn(s, x, y, list, color, title) {
  s.addText(title, {
    x, y, w: 5.91, h: 0.3,
    fontSize: 10, fontFace: 'Consolas', bold: true, color: color, charSpacing: 10
  });
  let cy = y + 0.32;
  list.forEach((tr, i) => {
    if (cy > 7.0) return;
    s.addText(`${tr.icon || '▪'}  ${tr.label}`, {
      x: x, y: cy, w: 5.91, h: 0.32,
      fontSize: 12, fontFace: 'Malgun Gothic', color: '1A1A2E', valign: 'middle'
    });
    cy += 0.34;
  });
}

function countPhaseRealTracks(phase) {
  return getPhaseTracks(phase).length;
}
function getPhaseTracks(phase) {
  // Walk the array, track current phase via section headers
  const result = [];
  let cur = null;
  tracks.forEach(tr => {
    if (tr.type === 'section') {
      const lbl = (tr.label || '').toUpperCase();
      if (lbl.includes('PHASE 1')) cur = 'p1';
      else if (lbl.includes('PHASE 2')) cur = 'p2';
      else cur = null;
      return;
    }
    if (cur === phase) result.push(tr);
  });
  return result;
}

// ---- Phase slide (gantt) ----
function buildPhaseSlide(pptx, phase) {
  const s = pptx.addSlide();
  s.background = { fill: 'FFFFFF' };

  const phaseInfo = phase === 'p1'
    ? { name: 'Phase 1 — Design Guide Agent', color: '2563EB', start: 0, end: 9 }
    : { name: 'Phase 2 — Full Agent', color: '7C3AED', start: 9, end: 21 };
  const phaseTracks = getPhaseTracks(phase);

  // Title
  s.addText(phaseInfo.name, {
    x: 0.5, y: 0.25, w: 12.3, h: 0.5,
    fontSize: 22, fontFace: 'Malgun Gothic', bold: true, color: phaseInfo.color
  });
  const rangeStr = dateConfig.showDates
    ? `${monthIdxToDateStr(phaseInfo.start)} ~ ${monthIdxToDateStr(phaseInfo.end - 1)}  ·  ${phaseInfo.end - phaseInfo.start}개월`
    : `M${phaseInfo.start + 1} ~ M${phaseInfo.end}  ·  ${phaseInfo.end - phaseInfo.start}개월`;
  s.addText(rangeStr, {
    x: 0.5, y: 0.75, w: 12.3, h: 0.3,
    fontSize: 11, fontFace: 'Consolas', color: '64748B'
  });

  // Gantt area
  const ganttX = 0.5;
  const ganttY = 1.25;
  const ganttW = 12.3;
  const labelW = 2.4;
  const barAreaX = ganttX + labelW;
  const barAreaW = ganttW - labelW;
  const span = phaseInfo.end - phaseInfo.start;
  const pxPerMonth = barAreaW / span;

  // Month axis
  s.addText('TRACK', {
    x: ganttX + 0.05, y: ganttY, w: labelW - 0.1, h: 0.32,
    fontSize: 10, fontFace: 'Consolas', bold: true, color: '1A1A2E'
  });
  for (let i = phaseInfo.start; i < phaseInfo.end; i++) {
    s.addText(formatMonthLabel(i), {
      x: barAreaX + (i - phaseInfo.start) * pxPerMonth, y: ganttY,
      w: pxPerMonth, h: 0.32,
      fontSize: dateConfig.showDates ? 8 : 9,
      fontFace: 'Consolas', color: '475569', align: 'center'
    });
  }

  // Header line
  s.addShape('line', {
    x: ganttX, y: ganttY + 0.36, w: ganttW, h: 0,
    line: { color: '1A1A2E', width: 1.5 }
  });

  // Tracks
  const rowH = 0.45;
  const maxRowsOnSlide = 12;
  const tracksToShow = phaseTracks.slice(0, maxRowsOnSlide);

  tracksToShow.forEach((tr, ti) => {
    const ry = ganttY + 0.42 + ti * rowH;

    // Track label
    const catColor = PPT_CAT_COLORS[tr.cat] || '64748B';
    s.addShape('rect', {
      x: ganttX + 0.05, y: ry + 0.05, w: 0.32, h: 0.32,
      fill: { color: catColor }, line: { color: catColor },
      rectRadius: 0.04
    });
    s.addText(tr.icon || '▪', {
      x: ganttX + 0.05, y: ry + 0.05, w: 0.32, h: 0.32,
      fontSize: 11, color: 'FFFFFF', align: 'center', valign: 'middle'
    });
    s.addText(tr.label, {
      x: ganttX + 0.42, y: ry + 0.02, w: labelW - 0.45, h: 0.4,
      fontSize: 10, fontFace: 'Malgun Gothic', bold: true, color: '1A1A2E', valign: 'middle'
    });

    // Bars
    (tr.bars || []).forEach(b => {
      const bs = Math.max(b.s, phaseInfo.start);
      const be = Math.min(b.e, phaseInfo.end);
      if (be <= bs) return;
      const bx = barAreaX + (bs - phaseInfo.start) * pxPerMonth;
      const bw = (be - bs) * pxPerMonth;
      const fillColor = PPT_COLORS[b.c] || '64748B';

      s.addShape('roundRect', {
        x: bx + 0.02, y: ry + 0.07, w: bw - 0.04, h: 0.28,
        fill: { color: fillColor }, line: { color: fillColor },
        rectRadius: 0.14
      });
      // Bar label (truncate if too narrow)
      if (bw > 0.5) {
        s.addText(b.t, {
          x: bx + 0.1, y: ry + 0.07, w: bw - 0.2, h: 0.28,
          fontSize: 9, fontFace: 'Malgun Gothic', bold: true, color: 'FFFFFF',
          valign: 'middle'
        });
      }
    });

    // Milestones (diamond shape)
    (tr.ms || []).forEach(m => {
      if (m.m < phaseInfo.start || m.m > phaseInfo.end) return;
      const mx = barAreaX + (m.m - phaseInfo.start) * pxPerMonth;
      const msColor = PPT_MS_COLORS[m.c] || '2563EB';
      s.addShape('diamond', {
        x: mx - 0.1, y: ry + 0.1, w: 0.2, h: 0.2,
        fill: { color: msColor + '33' /* alpha-ish via lighter shade */ },
        line: { color: msColor, width: 1.5 }
      });
    });
  });

  // Footnote if truncated
  if (phaseTracks.length > maxRowsOnSlide) {
    s.addText(`(${phaseTracks.length - maxRowsOnSlide}개 트랙 더 있음 — 다음 슬라이드 참조)`, {
      x: ganttX, y: ganttY + 0.42 + maxRowsOnSlide * rowH + 0.1,
      w: ganttW, h: 0.3,
      fontSize: 9, color: '94A3B8', fontFace: 'Malgun Gothic', italic: true
    });
  }
}

// ---- Track detail slide (subtracks + todos) ----
function buildTrackDetailSlide(pptx, tr, trackIdx) {
  const s = pptx.addSlide();
  s.background = { fill: 'FFFFFF' };

  // Compute track range
  const bars = tr.bars || [];
  const tStart = bars.length ? Math.min(...bars.map(b => b.s)) : 0;
  const tEnd = bars.length ? Math.max(...bars.map(b => b.e)) : MONTHS;

  // Determine phase color
  const phase = tracks.findIndex((t, i) => i <= trackIdx && t.type === 'section' && (t.label || '').toUpperCase().includes('PHASE 2')) >= 0
    ? '7C3AED' : '2563EB';
  // Actually walk to find the nearest section
  let phaseColor = '2563EB';
  for (let i = trackIdx; i >= 0; i--) {
    if (tracks[i].type === 'section') {
      const lbl = (tracks[i].label || '').toUpperCase();
      if (lbl.includes('PHASE 2')) phaseColor = '7C3AED';
      break;
    }
  }

  // Title bar
  s.addShape('rect', {
    x: 0, y: 0, w: 13.33, h: 0.9,
    fill: { color: phaseColor }, line: { color: phaseColor }
  });
  s.addText(`${tr.icon || '📋'}  ${tr.label}`, {
    x: 0.5, y: 0.15, w: 9, h: 0.6,
    fontSize: 22, fontFace: 'Malgun Gothic', bold: true, color: 'FFFFFF', valign: 'middle'
  });
  const rangeStr = dateConfig.showDates
    ? `${monthIdxToDateStr(Math.floor(tStart))} ~ ${monthIdxToDateStr(Math.ceil(tEnd) - 1)}`
    : `M${Math.round(tStart + 1)} ~ M${Math.round(tEnd)}`;
  s.addText(`${rangeStr}  ·  ${Math.round(tEnd - tStart)}개월`, {
    x: 9.5, y: 0.15, w: 3.5, h: 0.6,
    fontSize: 11, fontFace: 'Consolas', color: 'FFFFFF', align: 'right', valign: 'middle'
  });

  // Description
  if (tr.detail.description) {
    s.addText(tr.detail.description, {
      x: 0.5, y: 1.05, w: 12.3, h: 0.5,
      fontSize: 11, fontFace: 'Malgun Gothic', color: '475569', italic: true
    });
  }

  // Subtrack gantt
  const ganttY = 1.65;
  const labelW = 2.0;
  const ganttX = 0.5;
  const ganttW = 12.3;
  const barAreaX = ganttX + labelW;
  const barAreaW = ganttW - labelW;
  const span = Math.max(0.1, tEnd - tStart);
  const pxPerMonth = barAreaW / span;

  // Month axis
  const startInt = Math.floor(tStart);
  const endInt = Math.ceil(tEnd);
  for (let i = startInt; i < endInt; i++) {
    s.addText(formatMonthLabel(i), {
      x: barAreaX + (i - tStart) * pxPerMonth, y: ganttY,
      w: pxPerMonth, h: 0.3,
      fontSize: dateConfig.showDates ? 8 : 9,
      fontFace: 'Consolas', color: '475569', align: 'center'
    });
  }
  s.addShape('line', {
    x: ganttX, y: ganttY + 0.32, w: ganttW, h: 0,
    line: { color: '1A1A2E', width: 1.5 }
  });

  // Subtracks (with lane packing — match the on-screen detail view)
  const subs = tr.detail.subtracks || [];
  const subBarH = 0.26;
  const subLaneGap = 0.04;
  const subRowPadV = 0.08;
  let curY = ganttY + 0.36; // first row top

  subs.forEach((st, si) => {
    const catColor = PPT_CAT_COLORS[st.cat || tr.cat] || '64748B';

    // Lane packing: assign each bar to first lane that has no overlap
    const subBars = (st.bars || []).slice().sort((a, b) => a.s - b.s);
    const lanes = []; // each lane = array of placed bars
    const barLane = []; // index → lane number
    subBars.forEach((b, i) => {
      let placed = false;
      for (let li = 0; li < lanes.length; li++) {
        const lastBar = lanes[li][lanes[li].length - 1];
        if (lastBar.e <= b.s + 0.01) {
          lanes[li].push(b);
          barLane[i] = li;
          placed = true;
          break;
        }
      }
      if (!placed) {
        lanes.push([b]);
        barLane[i] = lanes.length - 1;
      }
    });

    const laneCount = Math.max(1, lanes.length);
    const rowH = subRowPadV + laneCount * subBarH + (laneCount - 1) * subLaneGap + subRowPadV;

    // Track label box
    s.addShape('rect', {
      x: ganttX + 0.05, y: curY + (rowH - 0.3) / 2, w: 0.32, h: 0.3,
      fill: { color: catColor }, line: { color: catColor },
      rectRadius: 0.04
    });
    s.addText(st.icon || '▪', {
      x: ganttX + 0.05, y: curY + (rowH - 0.3) / 2, w: 0.32, h: 0.3,
      fontSize: 10, color: 'FFFFFF', align: 'center', valign: 'middle'
    });
    s.addText(st.label, {
      x: ganttX + 0.42, y: curY, w: labelW - 0.45, h: rowH,
      fontSize: 9, fontFace: 'Malgun Gothic', bold: true, color: '1A1A2E', valign: 'middle'
    });

    // Place bars on assigned lanes
    subBars.forEach((b, i) => {
      const bs = Math.max(b.s, tStart);
      const be = Math.min(b.e, tEnd);
      if (be <= bs) return;
      const bx = barAreaX + (bs - tStart) * pxPerMonth;
      const bw = (be - bs) * pxPerMonth;
      const fillColor = PPT_COLORS[b.c] || '64748B';
      const lane = barLane[i];
      const by = curY + subRowPadV + lane * (subBarH + subLaneGap);

      s.addShape('roundRect', {
        x: bx + 0.02, y: by, w: bw - 0.04, h: subBarH,
        fill: { color: fillColor }, line: { color: fillColor },
        rectRadius: 0.13
      });
      if (bw > 0.4) {
        s.addText(b.t, {
          x: bx + 0.08, y: by, w: bw - 0.16, h: subBarH,
          fontSize: 8, fontFace: 'Malgun Gothic', bold: true, color: 'FFFFFF',
          valign: 'middle'
        });
      }
    });

    // Milestones — drawn at first lane row level
    (st.ms || []).forEach(m => {
      if (m.m < tStart || m.m > tEnd) return;
      const mx = barAreaX + (m.m - tStart) * pxPerMonth;
      const msColor = PPT_MS_COLORS[m.c] || '2563EB';
      const my = curY + subRowPadV + (subBarH - 0.18) / 2;
      s.addShape('diamond', {
        x: mx - 0.09, y: my, w: 0.18, h: 0.18,
        fill: { color: 'FFFFFF' },
        line: { color: msColor, width: 1.5 }
      });
    });

    curY += rowH + 0.04; // small gap between subtrack rows
  });

  // Todos (lower section) — adjust starting Y based on actual content used
  const todoStartY = curY + 0.2;
  if (todoStartY < 6.3) {
    s.addText('📋 Todo 체크리스트', {
      x: 0.5, y: todoStartY, w: 12.3, h: 0.3,
      fontSize: 12, fontFace: 'Malgun Gothic', bold: true, color: '1A1A2E'
    });
    // 2-col grid of todo summaries
    const cols = 2;
    const colW = 6.0;
    const itemY = todoStartY + 0.35;
    const maxRows = Math.floor((7.2 - itemY) / 0.18);
    let placed = 0;
    subs.forEach((st, si) => {
      if (!st.todos || !st.todos.length) return;
      if (placed >= cols * maxRows) return;
      const col = placed % cols;
      const row = Math.floor(placed / cols);
      const x = 0.5 + col * (colW + 0.3);
      const y = itemY + row * 0.18;
      // (Trying to cram all subgroups into the slide gets ugly; skip todo grid here.)
      // Instead, summarize each subgroup with its todo count
      placed++;
    });

    // Simplified: list each subtrack with its todo count + first 2 todos
    let cy = itemY;
    subs.forEach(st => {
      if (cy > 7.1) return;
      if (!st.todos || !st.todos.length) return;
      s.addText(`${st.icon || '▪'} ${st.label}  (${st.todos.length}개)`, {
        x: 0.5, y: cy, w: 12.3, h: 0.22,
        fontSize: 9, fontFace: 'Malgun Gothic', bold: true, color: '475569'
      });
      cy += 0.22;
      st.todos.slice(0, 2).forEach(t => {
        if (cy > 7.1) return;
        s.addText('  • ' + t, {
          x: 0.7, y: cy, w: 12.1, h: 0.2,
          fontSize: 8, fontFace: 'Malgun Gothic', color: '64748B'
        });
        cy += 0.2;
      });
      if (st.todos.length > 2) {
        s.addText(`  … +${st.todos.length - 2}개 더`, {
          x: 0.7, y: cy, w: 12.1, h: 0.2,
          fontSize: 8, fontFace: 'Malgun Gothic', color: '94A3B8', italic: true
        });
        cy += 0.2;
      }
      cy += 0.05;
    });
  }
}

document.getElementById('btnExportPPT').addEventListener('click', exportToPPT);

// ==============================================
// DATE CONTROLS
// ==============================================
function rerenderAll() {
  renderTimeline();
  renderTracks();
  if (viewMode === 'detail' && detailTrackIdx != null) {
    renderDetailView();
  }
}

function updatePhaseTabLabels() {
  const p1Chip = document.querySelector('.phase-tab[data-phase="p1"] .phase-tab-chip');
  const p2Chip = document.querySelector('.phase-tab[data-phase="p2"] .phase-tab-chip');
  if (dateConfig.showDates) {
    if (p1Chip) p1Chip.textContent = `${monthIdxToDateStr(0)} ~ ${monthIdxToDateStr(8)}`;
    if (p2Chip) p2Chip.textContent = `${monthIdxToDateStr(9)} ~ ${monthIdxToDateStr(20)}`;
  } else {
    if (p1Chip) p1Chip.textContent = 'M1~M9';
    if (p2Chip) p2Chip.textContent = 'M10~M21';
  }
}

document.getElementById('startDate').addEventListener('change', (e) => {
  const v = e.target.value; // YYYY-MM
  const m = v.match(/^(\d{4})-(\d{2})$/);
  if (!m) return;
  dateConfig.startYear = parseInt(m[1]);
  dateConfig.startMonth = parseInt(m[2]);
  saveDateConfig();
  updatePhaseTabLabels();
  rerenderAll();
  showToast(`시작 월: ${v}`);
});

document.getElementById('btnDateToggle').addEventListener('click', () => {
  dateConfig.showDates = !dateConfig.showDates;
  saveDateConfig();
  const btn = document.getElementById('btnDateToggle');
  const lbl = document.getElementById('dateToggleLabel');
  btn.classList.toggle('active-toggle', dateConfig.showDates);
  lbl.textContent = dateConfig.showDates ? 'M표시' : '날짜';
  updatePhaseTabLabels();
  rerenderAll();
  showToast(dateConfig.showDates ? '날짜 표시 모드' : 'M 표시 모드');
});

// Initialize toolbar UI from saved config
(() => {
  const dateInput = document.getElementById('startDate');
  dateInput.value = `${dateConfig.startYear}-${String(dateConfig.startMonth).padStart(2,'0')}`;
  const btn = document.getElementById('btnDateToggle');
  const lbl = document.getElementById('dateToggleLabel');
  btn.classList.toggle('active-toggle', dateConfig.showDates);
  lbl.textContent = dateConfig.showDates ? 'M표시' : '날짜';
})();

updatePhaseTabLabels();

setStatus('saved');
