<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HPWD-GPT 개발 로드맵 v5 · Editable</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;color:#1a1a2e;font-family:'Pretendard','Noto Sans KR',system-ui,sans-serif;padding:0;overflow-x:auto}
.page{min-width:1200px;max-width:1500px;margin:0 auto;padding:20px 28px;transition:padding-right .25s}
body.panel-open .page{padding-right:440px}

/* ===== Header ===== */
.header{margin-bottom:16px;display:flex;justify-content:space-between;align-items:flex-end;gap:20px}
.header h1{font-size:26px;font-weight:900;color:#1a1a2e;line-height:1.2}
.header h1 span{color:#2563EB}
.header-sub{font-size:10px;color:#64748b;margin-top:3px}

/* ===== Toolbar ===== */
.toolbar{display:flex;gap:6px;align-items:center}
.tbtn{padding:6px 10px;border:1px solid #e2e8f0;background:#fff;border-radius:6px;font-size:11px;font-weight:700;color:#475569;cursor:pointer;font-family:inherit;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.tbtn:hover{background:#f8fafc;border-color:#cbd5e1}
.tbtn:disabled{opacity:.4;cursor:not-allowed}
.tbtn:disabled:hover{background:#fff;border-color:#e2e8f0}
.tbtn.primary{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.tbtn.primary:hover{background:#2d2d4a}
.tbtn.active{background:#DC2626;color:#fff;border-color:#DC2626}
.tbtn.active:hover{background:#B91C1C}
.tbtn.danger{color:#DC2626;border-color:#FCA5A5}
.tbtn.danger:hover{background:#FEE2E2}
.tbtn-icon{font-size:13px}

.status-chip{font-size:9px;font-weight:700;color:#059669;background:#D1FAE5;padding:3px 7px;border-radius:10px;font-family:'JetBrains Mono',monospace}
.status-chip.dirty{color:#D97706;background:#FEF3C7}

/* ===== Phase Tabs ===== */
.phase-tabs{display:flex;gap:6px;margin-bottom:16px}
.phase-tab{flex:1;padding:18px 22px;background:#fff;border:2px solid #e2e8f0;border-radius:10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:14px;transition:all .15s;position:relative;overflow:hidden}
.phase-tab::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;background:#e2e8f0;transition:background .15s}
.phase-tab:hover{border-color:#cbd5e1;background:#f8fafc}
.phase-tab.active{background:#fff;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.phase-tab[data-phase="p1"].active{border-color:#2563EB}
.phase-tab[data-phase="p1"].active::before{background:linear-gradient(180deg,#2563EB,#3B82F6)}
.phase-tab[data-phase="p2"].active{border-color:#7C3AED}
.phase-tab[data-phase="p2"].active::before{background:linear-gradient(180deg,#7C3AED,#8B5CF6)}
.phase-tab.active[data-phase="p1"]{background:linear-gradient(135deg,rgba(37,99,235,.06),rgba(59,130,246,.03))}
.phase-tab.active[data-phase="p2"]{background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(139,92,246,.03))}
.phase-tab-badge{flex-shrink:0;width:50px;height:50px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f1f5f9;color:#64748b;font-family:'JetBrains Mono',monospace;font-weight:900;transition:all .15s}
.phase-tab-badge .pb-label{font-size:8px;letter-spacing:1px;line-height:1}
.phase-tab-badge .pb-num{font-size:22px;line-height:1;margin-top:2px}
.phase-tab.active[data-phase="p1"] .phase-tab-badge{background:linear-gradient(135deg,#2563EB,#3B82F6);color:#fff}
.phase-tab.active[data-phase="p2"] .phase-tab-badge{background:linear-gradient(135deg,#7C3AED,#8B5CF6);color:#fff}
.phase-tab-body{flex:1;min-width:0;text-align:left}
.phase-tab-body .pt-name{font-size:18px;font-weight:900;color:#1a1a2e;line-height:1.2;margin-bottom:4px;letter-spacing:-.02em}
.phase-tab.active[data-phase="p1"] .pt-name{color:#1E40AF}
.phase-tab.active[data-phase="p2"] .pt-name{color:#5B21B6}
.phase-tab-body .pt-meta{font-size:11px;color:#64748b;font-weight:600;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.phase-tab-body .pt-meta span{display:inline-flex;align-items:center;gap:3px}
.phase-tab-chip{font-size:9px;font-weight:800;padding:3px 7px;border-radius:10px;background:#f1f5f9;color:#64748b;letter-spacing:.3px}
.phase-tab.active[data-phase="p1"] .phase-tab-chip{background:#DBEAFE;color:#1E40AF}
.phase-tab.active[data-phase="p2"] .phase-tab-chip{background:#EDE9FE;color:#5B21B6}

/* ===== Legend ===== */
.legend-bar{display:flex;gap:14px;align-items:center;margin-bottom:14px;padding:7px 12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#475569;font-weight:600}
.legend-dot{width:9px;height:9px;border-radius:50%}
.legend-line{width:22px;height:4px;border-radius:2px}

/* ===== Phase Header ===== */
.phase-row{display:flex;margin-bottom:2px}
.phase-label-area{width:125px;flex-shrink:0}
.phase-timeline{flex:1;display:flex;position:relative}
.phase-block{text-align:center;padding:5px 0;font-size:10px;font-weight:800;color:#fff;border-radius:6px}
.phase-block.p1{background:linear-gradient(135deg,#2563EB,#3B82F6);flex:9}
.phase-block.p2{background:linear-gradient(135deg,#7C3AED,#8B5CF6);flex:12;margin-left:2px}

/* ===== Timeline Header ===== */
.timeline-header{display:flex;border-bottom:2px solid #1a1a2e;padding-bottom:5px}
.tl-label{width:155px;flex-shrink:0}
.tl-months{flex:1;display:flex}
.tl-month{flex:1;text-align:center;font-size:11px;font-weight:600;color:#475569;padding:4px 0}
.tl-month.q-start{border-left:1px solid #cbd5e1}

/* ===== Tracks ===== */
.track{display:flex;min-height:44px;border-bottom:1px solid #f1f5f9;position:relative}
.track:hover{background:#f8fafc}
.track-label{width:155px;flex-shrink:0;display:flex;align-items:center;padding:4px 8px;font-size:12px;font-weight:700;gap:6px;position:relative}
.track-bars{flex:1;display:flex;position:relative;align-items:center;padding:4px 0}
.cat{font-size:10px;padding:3px 4px;border-radius:3px;color:#fff;display:inline-flex;align-items:center;justify-content:center;min-width:22px;min-height:22px}

/* ===== Bars ===== */
.bar{position:absolute;height:30px;border-radius:15px;display:flex;align-items:center;padding:0 12px;font-size:12px;font-weight:700;color:#fff;white-space:nowrap;transition:filter .15s,transform .15s;overflow:hidden}
.bar:hover{filter:brightness(1.1);z-index:3}
.bar .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.55);margin-right:7px;flex-shrink:0}
.bar .dot.solid{background:#fff}

/* Edit mode: bar handles */
body.edit-mode .bar{cursor:move;padding-left:18px;padding-right:18px}
body.edit-mode .bar::before,body.edit-mode .bar::after{content:'';position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize;background:rgba(255,255,255,.25);transition:background .15s}
body.edit-mode .bar::before{left:0;border-top-left-radius:15px;border-bottom-left-radius:15px}
body.edit-mode .bar::after{right:0;border-top-right-radius:15px;border-bottom-right-radius:15px}
body.edit-mode .bar:hover::before,body.edit-mode .bar:hover::after{background:rgba(255,255,255,.5)}
body.edit-mode .bar.selected{outline:2px solid #1a1a2e;outline-offset:1px;z-index:4}
body.edit-mode .milestone.selected{outline:2px solid #1a1a2e;outline-offset:2px;z-index:5}
body.edit-mode .section-div{cursor:pointer}
body.edit-mode .section-div:hover{background:#FEF3C7}
body.edit-mode .section-div.selected{background:#FDE68A}

/* Dragging feedback */
body.dragging *{user-select:none !important}
body.dragging .bar{transition:none;pointer-events:none}
body.dragging .drag-overlay{display:block;pointer-events:auto}
.drag-overlay{display:none;position:fixed;inset:0;z-index:100;cursor:inherit}

/* Track reorder (drag handle on track label) */
body.edit-mode .track-label{cursor:pointer}
body.edit-mode .track-label:hover{background:#fef3c7;border-radius:4px}
body.edit-mode .track-label.selected{background:#FEF3C7;outline:1px solid #F59E0B;border-radius:4px}
body.edit-mode .track-label::after{content:'⋮⋮';position:absolute;right:4px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px;font-weight:700;letter-spacing:-2px;opacity:0;transition:opacity .15s;cursor:grab}
body.edit-mode .track-label:hover::after{opacity:.7}
body.edit-mode .track-label.section-label::after{display:none}

/* Track being dragged */
.track.track-dragging{opacity:.4;pointer-events:none}
.track.drop-indicator-above{box-shadow:inset 0 3px 0 0 #2563EB}
.track.drop-indicator-below{box-shadow:inset 0 -3px 0 0 #2563EB}
.section-div.track-dragging{opacity:.4;pointer-events:none}
.section-div.drop-indicator-above{box-shadow:inset 0 3px 0 0 #2563EB}
.section-div.drop-indicator-below{box-shadow:inset 0 -3px 0 0 #2563EB}

/* Bar cross-track drop indicator */
.track.bar-drop-target{background:#FEF3C7 !important}

/* Milestone: hover pointer in edit mode */
body.edit-mode .milestone{cursor:grab}
body.edit-mode .milestone:active{cursor:grabbing}
.milestone.ms-dragging{opacity:.5;z-index:10}

/* ===== Bar colors ===== */
.c-blue{background:linear-gradient(90deg,#2563EB,#3B82F6)}
.c-blue-l{background:linear-gradient(90deg,#60A5FA,#93C5FD)}
.c-green{background:linear-gradient(90deg,#059669,#10B981)}
.c-green-l{background:linear-gradient(90deg,#34D399,#6EE7B7)}
.c-amber{background:linear-gradient(90deg,#D97706,#F59E0B)}
.c-amber-l{background:linear-gradient(90deg,#FBBF24,#FCD34D)}
.c-purple{background:linear-gradient(90deg,#7C3AED,#8B5CF6)}
.c-purple-l{background:linear-gradient(90deg,#A78BFA,#C4B5FD)}
.c-red{background:linear-gradient(90deg,#DC2626,#EF4444)}
.c-red-l{background:linear-gradient(90deg,#F87171,#FCA5A5)}
.c-teal{background:linear-gradient(90deg,#0D9488,#14B8A6)}
.c-teal-l{background:linear-gradient(90deg,#2DD4BF,#5EEAD4)}
.c-pink{background:linear-gradient(90deg,#DB2777,#EC4899)}
.c-slate{background:linear-gradient(90deg,#475569,#64748b)}
.c-indigo{background:linear-gradient(90deg,#4338CA,#6366F1)}

.c-meet-w{background:repeating-linear-gradient(90deg,#059669 0,#059669 3px,#10B981 3px,#10B981 6px)}
.c-meet-b{background:repeating-linear-gradient(90deg,#2563EB 0,#2563EB 6px,#3B82F6 6px,#3B82F6 12px)}
.c-meet-m{background:repeating-linear-gradient(90deg,#7C3AED 0,#7C3AED 12px,#8B5CF6 12px,#8B5CF6 24px)}
.c-gate{background:linear-gradient(90deg,#DC2626,#EF4444);border:2px solid #fff;box-shadow:0 0 0 1px #DC2626}

/* ===== Milestones ===== */
.milestone{position:absolute;width:16px;height:16px;transform:rotate(45deg);border:2px solid;border-radius:3px;top:50%;margin-top:-8px;z-index:2}
.ms-blue{border-color:#2563EB;background:#DBEAFE}
.ms-green{border-color:#059669;background:#D1FAE5}
.ms-purple{border-color:#7C3AED;background:#EDE9FE}
.ms-red{border-color:#DC2626;background:#FEE2E2}

/* ===== Section Dividers ===== */
.section-div{display:flex;min-height:30px;background:#f1f5f9;border-bottom:1px solid #e2e8f0;align-items:center}
.section-div .track-label{font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px}

/* ===== Categories ===== */
.cat-sllm{background:#2563EB}.cat-phys{background:#059669}.cat-phys2{background:#10B981}
.cat-db{background:#D97706}.cat-ai{background:#7C3AED}.cat-route{background:#0D9488}
.cat-ui{background:#DC2626}.cat-kpi{background:#475569}

/* ===== Add Track Button ===== */
.add-track-btn{display:none;margin:8px auto;padding:6px 12px;border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:700;transition:all .15s}
.add-track-btn:hover{border-color:#2563EB;color:#2563EB;background:#EFF6FF}
body.edit-mode .add-track-btn{display:block}

/* ===== Side Panel ===== */
.side-panel{position:fixed;top:0;right:-440px;width:420px;height:100vh;background:#fff;box-shadow:-4px 0 20px rgba(0,0,0,.08);z-index:200;transition:right .25s ease;display:flex;flex-direction:column;border-left:1px solid #e2e8f0}
body.panel-open .side-panel{right:0}

.sp-head{padding:14px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:10px;background:#f8fafc}
.sp-head-title{flex:1;min-width:0}
.sp-head-type{font-size:9px;font-weight:800;color:#64748b;letter-spacing:.8px;text-transform:uppercase;margin-bottom:2px;font-family:'JetBrains Mono',monospace}
.sp-head-name{font-size:14px;font-weight:800;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-close{width:28px;height:28px;border-radius:14px;border:1px solid #e2e8f0;background:#fff;font-size:14px;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sp-close:hover{background:#f1f5f9;color:#1a1a2e}

.sp-body{flex:1;overflow-y:auto;padding:16px}

.sp-group{margin-bottom:18px}
.sp-group-title{font-size:10px;font-weight:800;color:#64748b;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sp-group-title::before{content:'';width:3px;height:10px;background:#1a1a2e;border-radius:2px}

.sp-field{margin-bottom:10px}
.sp-label{display:block;font-size:10px;font-weight:700;color:#475569;margin-bottom:4px}
.sp-input,.sp-select{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:6px;font-size:12px;font-family:inherit;color:#1a1a2e;background:#fff;transition:border-color .15s}
.sp-input:focus,.sp-select:focus{outline:none;border-color:#2563EB}
.sp-input-group{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.sp-input-group label{display:block;font-size:9px;font-weight:700;color:#64748b;margin-bottom:3px}
.sp-input-group input{width:100%}
.sp-help{font-size:9px;color:#94a3b8;margin-top:3px;line-height:1.4}

.sp-color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.sp-color-opt{height:28px;border-radius:5px;cursor:pointer;border:2px solid transparent;position:relative;transition:transform .1s}
.sp-color-opt:hover{transform:scale(1.05)}
.sp-color-opt.selected{border-color:#1a1a2e;box-shadow:0 0 0 2px #fff,0 0 0 3px #1a1a2e}
.sp-color-opt::after{content:attr(data-label);position:absolute;bottom:-14px;left:50%;transform:translateX(-50%);font-size:8px;color:#64748b;white-space:nowrap;opacity:0;transition:opacity .1s}
.sp-color-opt:hover::after{opacity:1}

.sp-list{border:1px solid #e2e8f0;border-radius:6px;overflow:hidden}
.sp-list-item{display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;padding:6px 8px;border-bottom:1px solid #f1f5f9;font-size:11px;align-items:center;cursor:pointer;transition:background .1s}
.sp-list-item:last-child{border-bottom:none}
.sp-list-item:hover{background:#f8fafc}
.sp-list-bar{width:40px;height:14px;border-radius:7px}
.sp-list-text{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a2e}
.sp-list-range{font-size:9px;color:#64748b;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.sp-list-del{background:none;border:none;color:#DC2626;cursor:pointer;font-size:14px;padding:0 3px;opacity:.4}
.sp-list-del:hover{opacity:1}

.sp-add-btn{width:100%;padding:8px;border:1px dashed #cbd5e1;background:#f8fafc;color:#64748b;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:6px;transition:all .15s}
.sp-add-btn:hover{border-color:#2563EB;color:#2563EB;background:#EFF6FF}

.sp-footer{padding:12px 16px;border-top:1px solid #e2e8f0;background:#f8fafc;display:flex;gap:6px}
.sp-footer .tbtn{flex:1;justify-content:center}

.sp-empty{text-align:center;color:#94a3b8;padding:60px 20px;font-size:12px}
.sp-empty-ico{font-size:32px;margin-bottom:10px;opacity:.5}

/* ===== Toast ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1a2e;color:#fff;padding:10px 18px;border-radius:8px;font-size:12px;font-weight:700;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:300;transition:transform .2s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="page">

<div class="header">
  <div>
    <h1>HPWD<span>-GPT</span> 개발 로드맵 v5</h1>
    <div class="header-sub">Phase 1: Design Guide Agent (1D+API) · Phase 2: Full Agent (Surrogate+sLLM) · 21개월</div>
  </div>
  <div class="toolbar">
    <span class="status-chip" id="statusChip">saved</span>
    <button class="tbtn" id="btnUndo" title="실행 취소 (Ctrl+Z)" disabled><span class="tbtn-icon">↶</span>Undo</button>
    <button class="tbtn" id="btnRedo" title="다시 실행 (Ctrl+Y)" disabled><span class="tbtn-icon">↷</span>Redo</button>
    <button class="tbtn" id="btnEdit"><span class="tbtn-icon">✏️</span>편집 모드</button>
    <button class="tbtn" id="btnExport" title="현재 데이터 JSON 내보내기"><span class="tbtn-icon">📥</span>Export</button>
    <button class="tbtn" id="btnImport" title="JSON 불러오기"><span class="tbtn-icon">📤</span>Import</button>
    <button class="tbtn danger" id="btnReset" title="기본값으로 복원"><span class="tbtn-icon">↻</span>초기화</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
  </div>
</div>

<div class="phase-tabs">
  <button class="phase-tab active" data-phase="p1">
    <div class="phase-tab-badge">
      <span class="pb-label">PHASE</span>
      <span class="pb-num">1</span>
    </div>
    <div class="phase-tab-body">
      <div class="pt-name">Design Guide Agent</div>
      <div class="pt-meta">
        <span class="phase-tab-chip">M1~M9</span>
        <span>9개월</span>
        <span>·</span>
        <span>Case A · 기존 제품 개선</span>
      </div>
    </div>
  </button>
  <button class="phase-tab" data-phase="p2">
    <div class="phase-tab-badge">
      <span class="pb-label">PHASE</span>
      <span class="pb-num">2</span>
    </div>
    <div class="phase-tab-body">
      <div class="pt-name">Full Agent</div>
      <div class="pt-meta">
        <span class="phase-tab-chip">M10~M21</span>
        <span>12개월</span>
        <span>·</span>
        <span>Case B · 신제품 설계</span>
      </div>
    </div>
  </button>
</div>

<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:#2563EB"></div>sLLM</div>
  <div class="legend-item"><div class="legend-dot" style="background:#059669"></div>물리 Lv1</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div>물리 Lv2+</div>
  <div class="legend-item"><div class="legend-dot" style="background:#D97706"></div>DB</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7C3AED"></div>AI 모델</div>
  <div class="legend-item"><div class="legend-dot" style="background:#0D9488"></div>경로</div>
  <div class="legend-item"><div class="legend-dot" style="background:#DC2626"></div>UI</div>
  <div class="legend-item">
    <svg width="13" height="13" viewBox="0 0 14 14"><rect x="3" y="3" width="8" height="8" rx="1" transform="rotate(45 7 7)" fill="#fff" stroke="#1a1a2e" stroke-width="1.5"/></svg>마일스톤
  </div>
  <div style="flex:1"></div>
  <div class="legend-item"><div class="legend-line c-blue"></div>핵심</div>
  <div class="legend-item"><div class="legend-line" style="background:#93C5FD"></div>확장</div>
</div>

<div class="timeline-header">
  <div class="tl-label" style="font-size:12px;font-weight:800;color:#1a1a2e;padding-left:8px">TRACK</div>
  <div class="tl-months" id="months"></div>
</div>

<div id="tracks"></div>

<button class="add-track-btn" id="addTrackBtn">+ 트랙 추가</button>

</div>

<!-- Side Panel -->
<aside class="side-panel" id="sidePanel">
  <div class="sp-head">
    <div class="sp-head-title">
      <div class="sp-head-type" id="spType">선택된 항목 없음</div>

// ==============================================
// STATE
// ==============================================
const STORAGE_KEY = 'roadmap-v5-data-v2';
const LEGACY_STORAGE_KEY = 'roadmap-v5-data';
const VIEW_KEY = 'roadmap-v5-view';
const HISTORY_LIMIT = 80;
let tracks = loadTracks();
let editMode = false;
let selection = null; // {type:'bar'|'track'|'milestone'|'section', trackIdx, barIdx?, msIdx?}
let activePhase = loadViewPhase(); // 'p1' or 'p2'

// View ranges (inclusive start, exclusive end)
const PHASE_RANGES = {
  p1: { start: 0, end: 9 },
  p2: { start: 9, end: 21 },
};

function loadViewPhase() {
  try {
    const v = localStorage.getItem(VIEW_KEY);
    if (v === 'p1' || v === 'p2') return v;
  } catch(e) {}
  return 'p1';
}
function saveViewPhase() {
  try { localStorage.setItem(VIEW_KEY, activePhase); } catch(e) {}
}
function getViewRange() {
  return PHASE_RANGES[activePhase];
}
function getViewSpan() {
  const r = getViewRange();
  return r.end - r.start;
}

// History + Clipboard
const history = { past: [], future: [] };
let clipboard = null; // {kind:'bar'|'milestone'|'track'|'section', data:{...}}

function deepClone(x) { return JSON.parse(JSON.stringify(x)); }

function snapshotState() {
  return { tracks: deepClone(tracks), selection: selection ? {...selection} : null };
}

// Any edit goes through mutate(). It captures a snapshot BEFORE the change.
function mutate(fn, opts = {}) {
  // opts.coalesce: string key - if last history entry has same key, don't push a new snapshot
  const snap = snapshotState();
  fn();
  // Only record if state actually changed
  if (JSON.stringify(history.past[history.past.length - 1]?.tracks) === JSON.stringify(tracks)) {
    // no-op
  } else {
    if (opts.coalesce && history.past.length && history.past[history.past.length - 1]._coalesce === opts.coalesce) {
      // keep existing snapshot (from start of coalesce session)
    } else {
      history.past.push({ ...snap, _coalesce: opts.coalesce || null });
      if (history.past.length > HISTORY_LIMIT) history.past.shift();
    }
    history.future.length = 0;
    saveTracks();
    renderTracks();
    renderPanel();
    updateUndoRedoButtons();
  }
}

function undo() {
  if (!history.past.length) return;
  const current = snapshotState();
  const prev = history.past.pop();
  history.future.push(current);
  tracks.length = 0;
  prev.tracks.forEach(t => tracks.push(t));
  selection = prev.selection;
  saveTracks();
  renderTracks();
  if (selection) openPanel(); else closePanel(false);
  renderPanel();
  updateUndoRedoButtons();
  showToast('↶ 되돌림');
}

function redo() {
  if (!history.future.length) return;
  const current = snapshotState();
  const next = history.future.pop();
  history.past.push(current);
  tracks.length = 0;
  next.tracks.forEach(t => tracks.push(t));
  selection = next.selection;
  saveTracks();
  renderTracks();
  if (selection) openPanel(); else closePanel(false);
  renderPanel();
  updateUndoRedoButtons();
  showToast('↷ 다시 실행');
}

function updateUndoRedoButtons() {
  const u = document.getElementById('btnUndo');
  const r = document.getElementById('btnRedo');
  if (u) u.disabled = history.past.length === 0;
  if (r) r.disabled = history.future.length === 0;
}

function loadTracks() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
    // Remove any legacy data from old schema versions
    try { localStorage.removeItem(LEGACY_STORAGE_KEY); } catch(e) {}
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_TRACKS));
}

function saveTracks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tracks));
    setStatus('saved');
  } catch(e) {
    console.error('Save failed:', e);
    setStatus('error');
  }
}

function setStatus(state) {
  const chip = document.getElementById('statusChip');
  if (state === 'saved') {
    chip.textContent = '✓ saved';
    chip.classList.remove('dirty');
  } else if (state === 'dirty') {
    chip.textContent = '● unsaved';
    chip.classList.add('dirty');
  } else if (state === 'error') {
    chip.textContent = '⚠ error';
    chip.classList.add('dirty');
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ==============================================
// CLIPBOARD (Copy / Cut / Paste)
// ==============================================
function copySelection() {
  if (!selection) return false;
  const tr = tracks[selection.trackIdx];
  if (!tr) return false;

  if (selection.type === 'bar') {
    clipboard = { kind: 'bar', data: deepClone(tr.bars[selection.barIdx]) };
    showToast('📋 Bar 복사됨');
  } else if (selection.type === 'milestone') {
    clipboard = { kind: 'milestone', data: deepClone(tr.ms[selection.msIdx]) };
    showToast('📋 마일스톤 복사됨');
  } else if (selection.type === 'track') {
    clipboard = { kind: 'track', data: deepClone(tr) };
    showToast('📋 트랙 복사됨');
  } else if (selection.type === 'section') {
    clipboard = { kind: 'section', data: deepClone(tr) };
    showToast('📋 섹션 복사됨');
  }
  return true;
}

function cutSelection() {
  if (!selection) return false;
  if (!copySelection()) return false;
  deleteSelection();
  return true;
}

function pasteClipboard() {
  if (!clipboard) { showToast('📋 클립보드 비어있음'); return; }
  mutate(() => {
    const k = clipboard.kind;

    if (k === 'bar') {
      // Paste into currently selected track (or selected bar's track)
      const tIdx = selection && (tracks[selection.trackIdx]?.type !== 'section')
        ? selection.trackIdx
        : tracks.findIndex(t => !t.type);
      if (tIdx < 0) { showToast('❗ 트랙을 먼저 선택하세요'); return; }
      const tr = tracks[tIdx];
      if (!tr.bars) tr.bars = [];
      const newBar = deepClone(clipboard.data);
      // Offset slightly so it's visible
      const len = newBar.e - newBar.s;
      newBar.s = Math.min(MONTHS - len, newBar.s + 0.5);
      newBar.e = newBar.s + len;
      tr.bars.push(newBar);
      selection = { type: 'bar', trackIdx: tIdx, barIdx: tr.bars.length - 1 };
      showToast('📋 Bar 붙여넣음');
    }
    else if (k === 'milestone') {
      const tIdx = selection && (tracks[selection.trackIdx]?.type !== 'section')
        ? selection.trackIdx
        : tracks.findIndex(t => !t.type);
      if (tIdx < 0) { showToast('❗ 트랙을 먼저 선택하세요'); return; }
      const tr = tracks[tIdx];
      if (!tr.ms) tr.ms = [];
      const newMs = deepClone(clipboard.data);
      tr.ms.push(newMs);
      selection = { type: 'milestone', trackIdx: tIdx, msIdx: tr.ms.length - 1 };
      showToast('📋 마일스톤 붙여넣음');
    }
    else if (k === 'track' || k === 'section') {
      // Insert after current selection, or at end
      const insertIdx = selection ? selection.trackIdx + 1 : tracks.length;
      const newTr = deepClone(clipboard.data);
      if (k === 'track' && newTr.label) newTr.label = newTr.label + ' (복사)';
      if (k === 'section' && newTr.label) newTr.label = newTr.label + ' (복사)';
      tracks.splice(insertIdx, 0, newTr);
      selection = { type: k === 'section' ? 'section' : 'track', trackIdx: insertIdx };
      showToast(`📋 ${k === 'section' ? '섹션' : '트랙'} 붙여넣음`);
    }
  });
}

function deleteSelection() {
  if (!selection) return;
  mutate(() => {
    const tr = tracks[selection.trackIdx];
    if (!tr) return;
    if (selection.type === 'bar') {
      tr.bars.splice(selection.barIdx, 1);
      selection = null;
    } else if (selection.type === 'milestone') {
      tr.ms.splice(selection.msIdx, 1);
      selection = null;
    } else if (selection.type === 'track' || selection.type === 'section') {
      tracks.splice(selection.trackIdx, 1);
      selection = null;
    }
  });
  closePanel(false);
}

// ==============================================
// RENDER: Timeline
// ==============================================
function renderTimeline() {
  const mEl = document.getElementById('months');
  mEl.innerHTML = '';
  const { start, end } = getViewRange();
  for (let i = start; i < end; i++) {
    const d = document.createElement('div');
    d.className = 'tl-month' + ((i - start) % 3 === 0 ? ' q-start' : '');
    d.textContent = 'M' + (i + 1);
    mEl.appendChild(d);
  }
}

function renderTracks() {
  const tEl = document.getElementById('tracks');
  tEl.innerHTML = '';

  const { start: viewStart, end: viewEnd } = getViewRange();
  const viewSpan = viewEnd - viewStart;

  // Helper: does this track belong to the active phase?
  // We use section headers as phase separators.
  // Tracks between "PHASE 1" section and "PHASE 2" section → p1
  // Tracks after "PHASE 2" section → p2
  // We also allow tracks with bars only in the active range.
  function trackPhase(tIdx) {
    // Walk backwards to find the nearest section header
    for (let i = tIdx; i >= 0; i--) {
      if (tracks[i].type === 'section') {
        const lbl = (tracks[i].label || '').toUpperCase();
        if (lbl.includes('PHASE 1')) return 'p1';
        if (lbl.includes('PHASE 2')) return 'p2';
        return null; // unknown section
      }
    }
    return null;
  }

  tracks.forEach((tr, tIdx) => {
    if (tr.type === 'section') {
      const lbl = (tr.label || '').toUpperCase();
      const secPhase = lbl.includes('PHASE 1') ? 'p1' : lbl.includes('PHASE 2') ? 'p2' : null;
      // Hide section header that doesn't match active phase
      if (secPhase && secPhase !== activePhase) return;
      // Hide section header for active phase too (phase name already shown in tab)
      if (secPhase === activePhase) return;
      // Other sections (no phase) always shown

      const row = document.createElement('div');
      row.className = 'section-div';
      row.dataset.trackIdx = tIdx;
      const secLabelDiv = document.createElement('div');
      secLabelDiv.className = 'track-label section-label';
      secLabelDiv.style.cssText = 'font-size:11px;font-weight:800;color:#64748b;letter-spacing:.5px';
      secLabelDiv.textContent = tr.label;
      if (selection && selection.type === 'section' && selection.trackIdx === tIdx) row.classList.add('selected');
      secLabelDiv.addEventListener('click', (e) => {
        if (!editMode) return;
        if (secLabelDiv.dataset.justDragged) { delete secLabelDiv.dataset.justDragged; return; }
        e.stopPropagation();
        selectItem({type:'section', trackIdx: tIdx});
      });
      attachTrackReorder(secLabelDiv, row, tIdx);
      row.appendChild(secLabelDiv);
      const sp = document.createElement('div');
      sp.style.flex = '1';
      row.appendChild(sp);
      tEl.appendChild(row);
      return;
    }

    // Only show tracks belonging to the active phase
    const tp = trackPhase(tIdx);
    if (tp !== activePhase) return;

    const row = document.createElement('div');
    row.className = 'track';
    row.dataset.trackIdx = tIdx;

    const labelDiv = document.createElement('div');
    labelDiv.className = 'track-label';
    labelDiv.innerHTML = `<span class="cat ${tr.cat}">${tr.icon}</span><span style="font-size:12px">${tr.label}</span>`;
    if (selection && selection.type === 'track' && selection.trackIdx === tIdx) labelDiv.classList.add('selected');
    labelDiv.addEventListener('click', (e) => {
      if (!editMode) return;
      if (labelDiv.dataset.justDragged) { delete labelDiv.dataset.justDragged; return; }
      e.stopPropagation();
      selectItem({type:'track', trackIdx: tIdx});
    });
    attachTrackReorder(labelDiv, row, tIdx);
    row.appendChild(labelDiv);

    const barsDiv = document.createElement('div');
    barsDiv.className = 'track-bars';

    (tr.bars || []).forEach((b, bIdx) => {
      // Clip to view range
      const bs = Math.max(b.s, viewStart);
      const be = Math.min(b.e, viewEnd);
      if (be <= bs) return; // outside view

      const bar = document.createElement('div');
      bar.className = `bar ${b.c}`;
      bar.style.left = ((bs - viewStart) / viewSpan * 100) + '%';
      bar.style.width = ((be - bs) / viewSpan * 100) + '%';
      bar.innerHTML = `<span class="dot${b.e <= P1_END ? ' solid' : ''}"></span>${b.t}`;
      bar.title = `M${b.s+1}~M${b.e}: ${b.t}`;
      bar.dataset.trackIdx = tIdx;
      bar.dataset.barIdx = bIdx;
      if (selection && selection.type === 'bar' && selection.trackIdx === tIdx && selection.barIdx === bIdx) {
        bar.classList.add('selected');
      }
      attachBarInteractions(bar, tIdx, bIdx, barsDiv);
      barsDiv.appendChild(bar);
    });

    (tr.ms || []).forEach((m, mIdx) => {
      // Only show milestones inside view range
      if (m.m < viewStart || m.m > viewEnd) return;

      const ms = document.createElement('div');
      ms.className = `milestone ${m.c}`;
      ms.style.left = `calc(${(m.m - viewStart) / viewSpan * 100}% - 8px)`;
      ms.title = `M${m.m} 마일스톤 · 드래그로 이동`;
      ms.dataset.trackIdx = tIdx;
      ms.dataset.msIdx = mIdx;
      if (selection && selection.type === 'milestone' && selection.trackIdx === tIdx && selection.msIdx === mIdx) {
        ms.classList.add('selected');
      }
      attachMilestoneDrag(ms, barsDiv, tIdx, mIdx);
      barsDiv.appendChild(ms);
    });

    // Vertical gridlines within view range
    for (let i = viewStart; i < viewEnd; i++) {
      const line = document.createElement('div');
      line.style.cssText = `position:absolute;left:${((i - viewStart) / viewSpan * 100)}%;top:0;bottom:0;width:1px;background:${(i - viewStart) % 3 === 0 ? '#e2e8f0' : '#f1f5f9'};z-index:0;pointer-events:none`;
      barsDiv.appendChild(line);
    }

    row.appendChild(barsDiv);
    tEl.appendChild(row);
  });
}

// ==============================================
// DRAG: Bar editing
// ==============================================
function attachBarInteractions(bar, tIdx, bIdx, barsDiv) {
  bar.addEventListener('click', (e) => {
    if (!editMode) return;
    if (bar.dataset.justDragged) { delete bar.dataset.justDragged; return; }
    e.stopPropagation();
    selectItem({type:'bar', trackIdx: tIdx, barIdx: bIdx});
  });

  bar.addEventListener('pointerdown', (e) => {
    if (!editMode) return;
    e.stopPropagation();

    const rect = bar.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const EDGE = 8;
    let mode;
    if (x < EDGE) mode = 'resize-start';
    else if (x > rect.width - EDGE) mode = 'resize-end';
    else mode = 'move';

    const barsRect = barsDiv.getBoundingClientRect();
    const viewSpan = getViewSpan();
    const viewStart = getViewRange().start;
    const viewEnd = getViewRange().end;
    const pxPerMonth = barsRect.width / viewSpan;
    const startMouseX = e.clientX;
    const orig = { ...tracks[tIdx].bars[bIdx] };

    // Snapshot BEFORE drag starts so one undo reverts the whole drag
    const preDragSnap = snapshotState();
    let didChange = false;
    let dropTargetTrackIdx = null; // for cross-track drop (only on "move" mode)

    document.body.classList.add('dragging');

    function clearDropTargets() {
      document.querySelectorAll('.track.bar-drop-target').forEach(el => el.classList.remove('bar-drop-target'));
    }

    function onMove(ev) {
      const dx = ev.clientX - startMouseX;
      const dm = dx / pxPerMonth;
      const snap = (v) => Math.max(0, Math.min(MONTHS, Math.round(v * 10) / 10));

      const b = tracks[tIdx].bars[bIdx];
      if (mode === 'resize-start') {
        const newS = snap(orig.s + dm);
        if (newS < b.e - 0.1 && newS !== b.s) { b.s = newS; didChange = true; }
      } else if (mode === 'resize-end') {
        const newE = snap(orig.e + dm);
        if (newE > b.s + 0.1 && newE !== b.e) { b.e = newE; didChange = true; }
      } else {
        const len = orig.e - orig.s;
        let newS = snap(orig.s + dm);
        if (newS + len > MONTHS) newS = MONTHS - len;
        if (newS < 0) newS = 0;
        if (newS !== b.s) { b.s = newS; b.e = newS + len; didChange = true; }

        // Cross-track hit test (only for move mode)
        clearDropTargets();
        const hoverEl = document.elementFromPoint(ev.clientX, ev.clientY);
        const targetTrack = hoverEl && hoverEl.closest('.track');
        if (targetTrack && targetTrack.dataset.trackIdx) {
          const targetIdx = parseInt(targetTrack.dataset.trackIdx);
          if (targetIdx !== tIdx && tracks[targetIdx] && !tracks[targetIdx].type) {
            targetTrack.classList.add('bar-drop-target');
            dropTargetTrackIdx = targetIdx;
          } else {
            dropTargetTrackIdx = null;
          }
        } else {
          dropTargetTrackIdx = null;
        }
      }

      // Redraw bar clipped to current view
      const bsC = Math.max(b.s, viewStart);
      const beC = Math.min(b.e, viewEnd);
      if (beC > bsC) {
        bar.style.left = ((bsC - viewStart) / viewSpan * 100) + '%';
        bar.style.width = ((beC - bsC) / viewSpan * 100) + '%';
      }
      bar.dataset.justDragged = '1';
      setStatus('dirty');
      if (selection && selection.type === 'bar' && selection.trackIdx === tIdx && selection.barIdx === bIdx) {
        updateSidePanelValues();
      }
    }

    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.body.classList.remove('dragging');
      clearDropTargets();

      // Cross-track drop: move the bar to target track
      if (mode === 'move' && dropTargetTrackIdx != null && dropTargetTrackIdx !== tIdx) {
        const srcTrack = tracks[tIdx];
        const dstTrack = tracks[dropTargetTrackIdx];
        if (!dstTrack.bars) dstTrack.bars = [];
        const movingBar = srcTrack.bars[bIdx];
        srcTrack.bars.splice(bIdx, 1);
        dstTrack.bars.push(movingBar);
        selection = { type: 'bar', trackIdx: dropTargetTrackIdx, barIdx: dstTrack.bars.length - 1 };
        didChange = true;
        renderTracks();
        renderPanel();
        showToast(`Bar을 "${dstTrack.label}" 트랙으로 이동`);
      }

      if (didChange) {
        // Record the drag as a single history entry
        history.past.push(preDragSnap);
        if (history.past.length > HISTORY_LIMIT) history.past.shift();
        history.future.length = 0;
        saveTracks();
        updateUndoRedoButtons();
      }
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}

// ==============================================
// DRAG: Track reorder (drag track label up/down)
// ==============================================
function attachTrackReorder(labelDiv, rowEl, tIdx) {
  labelDiv.addEventListener('pointerdown', (e) => {
    if (!editMode) return;
    // Let clicks on things inside the label bubble up if needed
    // Only trigger on primary button
    if (e.button !== 0) return;

    const startX = e.clientX;
    const startY = e.clientY;
    let started = false;
    let preDragSnap = null;

    function clearDropIndicators() {
      document.querySelectorAll('.drop-indicator-above, .drop-indicator-below').forEach(el => {
        el.classList.remove('drop-indicator-above', 'drop-indicator-below');
      });
    }

    let dropTargetIdx = null;
    let dropPosition = null; // 'above' | 'below'

    function onMove(ev) {
      const dx = ev.clientX - startX;
      const dy = ev.clientY - startY;
      if (!started) {
        if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
        // Movement threshold exceeded → start dragging
        started = true;
        preDragSnap = snapshotState();
        document.body.classList.add('dragging');
        rowEl.classList.add('track-dragging');
        labelDiv.dataset.justDragged = '1';
      }

      // Find drop target
      clearDropIndicators();
      const hoverEl = document.elementFromPoint(ev.clientX, ev.clientY);
      const targetRow = hoverEl && (hoverEl.closest('.track') || hoverEl.closest('.section-div'));
      if (targetRow && targetRow.dataset.trackIdx != null) {
        const targetIdx = parseInt(targetRow.dataset.trackIdx);
        if (targetIdx !== tIdx) {
          const rect = targetRow.getBoundingClientRect();
          const midY = rect.top + rect.height / 2;
          if (ev.clientY < midY) {
            targetRow.classList.add('drop-indicator-above');
            dropPosition = 'above';
          } else {
            targetRow.classList.add('drop-indicator-below');
            dropPosition = 'below';
          }
          dropTargetIdx = targetIdx;
        } else {
          dropTargetIdx = null;
        }
      } else {
        dropTargetIdx = null;
      }
    }

    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      clearDropIndicators();
      if (!started) return;
      document.body.classList.remove('dragging');
      rowEl.classList.remove('track-dragging');

      if (dropTargetIdx != null && dropTargetIdx !== tIdx) {
        // Compute new index
        let newIdx = dropPosition === 'above' ? dropTargetIdx : dropTargetIdx + 1;
        // Extract the track
        const movedTrack = tracks[tIdx];
        tracks.splice(tIdx, 1);
        // Adjust newIdx if original was before target
        if (tIdx < newIdx) newIdx--;
        tracks.splice(newIdx, 0, movedTrack);
        // Update selection
        selection = { type: tracks[newIdx].type === 'section' ? 'section' : 'track', trackIdx: newIdx };

        // Record as single history entry
        history.past.push(preDragSnap);
        if (history.past.length > HISTORY_LIMIT) history.past.shift();
        history.future.length = 0;

        saveTracks();
        renderTracks();
        renderPanel();
        updateUndoRedoButtons();
        showToast('트랙 이동됨');
      }
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}

// ==============================================
// DRAG: Milestone horizontal drag
// ==============================================
function attachMilestoneDrag(msEl, barsDiv, tIdx, mIdx) {
  msEl.addEventListener('pointerdown', (e) => {
    if (!editMode) return;
    if (e.button !== 0) return;
    e.stopPropagation();

    const barsRect = barsDiv.getBoundingClientRect();
    const viewSpan = getViewSpan();
    const viewStart = getViewRange().start;
    const viewEnd = getViewRange().end;
    const pxPerMonth = barsRect.width / viewSpan;
    const startMouseX = e.clientX;
    const orig = tracks[tIdx].ms[mIdx].m;

    const preDragSnap = snapshotState();
    let didChange = false;
    let started = false;

    function onMove(ev) {
      const dx = ev.clientX - startMouseX;
      if (!started) {
        if (Math.abs(dx) < 2 && Math.abs(ev.clientY - e.clientY) < 2) return;
        started = true;
        document.body.classList.add('dragging');
        msEl.classList.add('ms-dragging');
        msEl.dataset.justDragged = '1';
      }
      const dm = dx / pxPerMonth;
      const snap = (v) => Math.max(0, Math.min(MONTHS, Math.round(v * 2) / 2)); // 0.5-month snap
      const newM = snap(orig + dm);
      const m = tracks[tIdx].ms[mIdx];
      if (newM !== m.m) { m.m = newM; didChange = true; }

      // Clip to view
      if (m.m < viewStart || m.m > viewEnd) {
        msEl.style.display = 'none';
      } else {
        msEl.style.display = '';
        msEl.style.left = `calc(${(m.m - viewStart) / viewSpan * 100}% - 8px)`;
      }
      setStatus('dirty');
      if (selection && selection.type === 'milestone' && selection.trackIdx === tIdx && selection.msIdx === mIdx) {
        const field = document.getElementById('fMsM');
        if (field) field.value = m.m;
        const nameEl = document.getElementById('spName');
        if (nameEl) nameEl.textContent = `M${m.m} 마일스톤`;
      }
    }

    function onUp() {
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      if (started) {
        document.body.classList.remove('dragging');
        msEl.classList.remove('ms-dragging');
      }
      if (didChange) {
        history.past.push(preDragSnap);
        if (history.past.length > HISTORY_LIMIT) history.past.shift();
        history.future.length = 0;
        saveTracks();
        updateUndoRedoButtons();
      }
    }

    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });

  // Click (without drag) opens panel
  msEl.addEventListener('click', (e) => {
    if (!editMode) return;
    if (msEl.dataset.justDragged) { delete msEl.dataset.justDragged; return; }
    e.stopPropagation();
    selectItem({type:'milestone', trackIdx: tIdx, msIdx: mIdx});
  });
}

// ==============================================
// SIDE PANEL
// ==============================================
function selectItem(sel) {
  selection = sel;
  renderTracks();
  openPanel();
  renderPanel();
}

function openPanel() {
  document.body.classList.add('panel-open');
}

function closePanel(clearSelection = true) {
  document.body.classList.remove('panel-open');
  if (clearSelection) {
    selection = null;
    renderTracks();
  }
}

function renderPanel() {
  const typeEl = document.getElementById('spType');
  const nameEl = document.getElementById('spName');
  const bodyEl = document.getElementById('spBody');

  if (!selection) {
    typeEl.textContent = '선택된 항목 없음';
    nameEl.textContent = '-';
    bodyEl.innerHTML = '<div class="sp-empty"><div class="sp-empty-ico">👆</div>요소를 클릭해서 편집하세요</div>';
    return;
  }

  const { type, trackIdx } = selection;
  const tr = tracks[trackIdx];

  // Safety: if selection became invalid (e.g. after undo)
  if (!tr) {
    selection = null;
    typeEl.textContent = '선택된 항목 없음';
    nameEl.textContent = '-';
    bodyEl.innerHTML = '<div class="sp-empty"><div class="sp-empty-ico">👆</div>요소를 클릭해서 편집하세요</div>';
    return;
  }

  if (type === 'section') {
    typeEl.textContent = 'SECTION';
    nameEl.textContent = tr.label;
    bodyEl.innerHTML = `
      <div class="sp-group">
        <div class="sp-group-title">섹션 라벨</div>
        <div class="sp-field">
          <input class="sp-input" id="fSecLabel" value="${esc(tr.label)}" placeholder="섹션 이름">
          <div class="sp-help">예: PHASE 1 — 기존 모델 개선 (9개월)</div>
        </div>
      </div>
      <div class="sp-group">
        <div class="sp-group-title">작업</div>
        <button class="tbtn danger" style="width:100%;justify-content:center" id="btnDelSec">🗑 섹션 삭제 (Delete)</button>
      </div>
      <div class="sp-group">
        <div class="sp-group-title">키보드 단축키</div>
        <div class="sp-help" style="font-size:10px;line-height:1.8">
          <b>Ctrl+C</b> 복사 · <b>Ctrl+X</b> 잘라내기<br>
          <b>Ctrl+V</b> 붙여넣기 · <b>Del</b> 삭제<br>
          <b>Ctrl+Z</b> 실행 취소 · <b>Ctrl+Y</b> 다시 실행
        </div>
      </div>
    `;
    document.getElementById('fSecLabel').addEventListener('input', (e) => {
      const val = e.target.value;
      mutate(() => { tr.label = val; }, {coalesce: `sec-label-${trackIdx}`});
      nameEl.textContent = tr.label;
    });
    document.getElementById('btnDelSec').addEventListener('click', () => {
      if (!confirm('이 섹션을 삭제합니다.')) return;
      deleteSelection();
    });
  } else if (type === 'track') {
    typeEl.textContent = 'TRACK';
    nameEl.textContent = tr.label;

    const catOptions = CATEGORIES.map(c => `<option value="${c.v}" ${c.v === tr.cat ? 'selected' : ''}>${c.l}</option>`).join('');
    const barsListHtml = (tr.bars || []).map((b, i) => `
      <div class="sp-list-item" data-bar-idx="${i}">
        <div class="sp-list-bar ${b.c}"></div>
        <div class="sp-list-text">${esc(b.t)}</div>
        <div class="sp-list-range">M${(b.s + 1).toFixed(b.s % 1 === 0 ? 0 : 1)}~M${b.e.toFixed(b.e % 1 === 0 ? 0 : 1)}</div>
        <button class="sp-list-del" data-del-bar="${i}">✕</button>
      </div>
    `).join('');

        <div class="sp-list-bar milestone ${m.c}" style="position:static;transform:rotate(45deg);width:12px;height:12px"></div>

        <div class="sp-list-range">M${m.m}</div>
        <button class="sp-list-del" data-del-ms="${i}">✕</button>
      </div>
    `).join('');

    bodyEl.innerHTML = `
      <div class="sp-group">
        <div class="sp-group-title">기본 정보</div>
        <div class="sp-field">
          <label class="sp-label">라벨</label>
          <input class="sp-input" id="fLabel" value="${esc(tr.label)}">
        </div>
        <div class="sp-field">
          <label class="sp-label">아이콘 (이모지)</label>
          <input class="sp-input" id="fIcon" value="${esc(tr.icon || '')}" placeholder="예: 🗣️ 🧠 📦">
        </div>
        <div class="sp-field">
          <label class="sp-label">카테고리</label>
          <select class="sp-select" id="fCat">${catOptions}</select>
        </div>
      </div>
      <div class="sp-group">
        <div class="sp-group-title">Bar 목록 (${(tr.bars || []).length}개)</div>
        <div class="sp-list">${barsListHtml || '<div style="padding:12px;font-size:11px;color:#94a3b8;text-align:center">bar 없음</div>'}</div>
        <button class="sp-add-btn" id="btnAddBar">+ Bar 추가</button>
      </div>
      <div class="sp-group">
        <div class="sp-group-title">마일스톤 (${(tr.ms || []).length}개)</div>
        <div class="sp-list">${msListHtml || '<div style="padding:12px;font-size:11px;color:#94a3b8;text-align:center">마일스톤 없음</div>'}</div>
        <button class="sp-add-btn" id="btnAddMs">+ 마일스톤 추가</button>
      </div>
      <div class="sp-group">
        <div class="sp-group-title">작업</div>
        <button class="tbtn danger" style="width:100%;justify-content:center" id="btnDelTrack">🗑 트랙 삭제</button>
      </div>
    `;

    document.getElementById('fLabel').addEventListener('input', (e) => {
      const val = e.target.value;
      mutate(() => { tr.label = val; }, {coalesce: `tr-label-${trackIdx}`});
      nameEl.textContent = tr.label;
    });
    document.getElementById('fIcon').addEventListener('input', (e) => {
      const val = e.target.value;
      mutate(() => { tr.icon = val; }, {coalesce: `tr-icon-${trackIdx}`});
    });
    document.getElementById('fCat').addEventListener('change', (e) => {
      const val = e.target.value;
      mutate(() => { tr.cat = val; });
    });

    bodyEl.querySelectorAll('[data-bar-idx]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.dataset.delBar !== undefined) return;
        const idx = parseInt(el.dataset.barIdx);
        selectItem({type:'bar', trackIdx, barIdx: idx});
      });
    });
    bodyEl.querySelectorAll('[data-del-bar]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.delBar);
        if (!confirm(`Bar "${tr.bars[idx].t}" 삭제?`)) return;
        mutate(() => { tr.bars.splice(idx, 1); });
      });
    });
    bodyEl.querySelectorAll('[data-ms-idx]').forEach(el => {
      el.addEventListener('click', (e) => {
        if (e.target.dataset.delMs !== undefined) return;
        const idx = parseInt(el.dataset.msIdx);
        selectItem({type:'milestone', trackIdx, msIdx: idx});
      });
    });
    bodyEl.querySelectorAll('[data-del-ms]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const idx = parseInt(btn.dataset.delMs);
        mutate(() => { tr.ms.splice(idx, 1); });
      });
    });
    document.getElementById('btnAddBar').addEventListener('click', () => {
      mutate(() => {
        if (!tr.bars) tr.bars = [];
        const lastEnd = tr.bars.length ? tr.bars[tr.bars.length - 1].e : 0;
        tr.bars.push({s: lastEnd, e: Math.min(lastEnd + 2, MONTHS), c: 'c-blue', t: '새 작업'});
        selection = {type:'bar', trackIdx, barIdx: tr.bars.length - 1};
      });
    });
    document.getElementById('btnAddMs').addEventListener('click', () => {
      mutate(() => {
        if (!tr.ms) tr.ms = [];
        tr.ms.push({m: Math.floor(MONTHS / 2), c: 'ms-blue'});
        selection = {type:'milestone', trackIdx, msIdx: tr.ms.length - 1};
      });
    });
    document.getElementById('btnDelTrack').addEventListener('click', () => {
      if (!confirm(`트랙 "${tr.label}" 삭제?`)) return;
      deleteSelection();
    });
  } else if (type === 'bar') {
    const b = tr.bars[selection.barIdx];
    typeEl.textContent = `BAR · ${tr.label}`;
    nameEl.textContent = b.t;

    const colorGrid = BAR_COLORS.map(c => `
      <div class="sp-color-opt ${c.v} ${c.v === b.c ? 'selected' : ''}" data-color="${c.v}" data-label="${c.l}" title="${c.l}"></div>
    `).join('');

    bodyEl.innerHTML = `
      <div class="sp-group">
        <div class="sp-group-title">텍스트</div>
        <div class="sp-field">
          <input class="sp-input" id="fBarText" value="${esc(b.t)}" placeholder="작업 이름">
        </div>
      </div>
      <div class="sp-group">
        <div class="sp-group-title">기간 (M1~M${MONTHS})</div>
        <div class="sp-input-group">
          <div>
            <label>시작 월</label>
            <input class="sp-input" type="number" id="fBarS" value="${b.s}" min="0" max="${MONTHS}" step="0.1">
          </div>
          <div>
            <label>종료 월</label>
            <input class="sp-input" type="number" id="fBarE" value="${b.e}" min="0" max="${MONTHS}" step="0.1">
          </div>
        </div>

      </div>

        <div class="sp-group-title">색상</div>
        <div class="sp-color-grid">${colorGrid}</div>

      nameEl.textContent = b.t;

        mutate(() => { b.e = v; }, {coalesce: `bar-e-${trackIdx}-${selection.barIdx}`});
      }
    });

    });
    document.getElementById('btnDelBar').addEventListener('click', () => {
      if (!confirm(`Bar "${b.t}" 삭제?`)) return;
      deleteSelection();
    });
  } else if (type === 'milestone') {
    const m = tr.ms[selection.msIdx];
    typeEl.textContent = `MILESTONE · ${tr.label}`;
    nameEl.textContent = `M${m.m} 마일스톤`;

      <div class="sp-group">

        <button class="tbtn danger" style="width:100%;justify-content:center" id="btnDelMs">🗑 마일스톤 삭제</button>
      </div>

    document.getElementById('fMsM').addEventListener('input', (e) => {
      const v = Math.max(0, Math.min(MONTHS, parseFloat(e.target.value) || 0));
      mutate(() => { m.m = v; }, {coalesce: `ms-m-${trackIdx}-${selection.msIdx}`});
      nameEl.textContent = `M${v} 마일스톤`;

    });
    document.getElementById('btnDelMs').addEventListener('click', () => {
      if (!confirm('마일스톤 삭제?')) return;
      deleteSelection();
    });
  }
}

function updateSidePanelValues() {
  if (!selection || selection.type !== 'bar') return;
  const b = tracks[selection.trackIdx].bars[selection.barIdx];
  const s = document.getElementById('fBarS');
  const e = document.getElementById('fBarE');
  if (s) s.value = b.s;
  if (e) e.value = b.e;
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// ==============================================
// TOOLBAR ACTIONS
// ==============================================
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);

document.getElementById('btnEdit').addEventListener('click', () => {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  const btn = document.getElementById('btnEdit');
  btn.classList.toggle('active', editMode);
  btn.innerHTML = editMode
    ? '<span class="tbtn-icon">✕</span>편집 종료'
    : '<span class="tbtn-icon">✏️</span>편집 모드';
  if (!editMode) closePanel();
  showToast(editMode ? '편집 모드 ON · 클릭하여 수정' : '편집 모드 OFF');
});

document.getElementById('btnExport').addEventListener('click', () => {
  const data = JSON.stringify(tracks, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `roadmap-v5-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('JSON 다운로드 완료');
});

document.getElementById('btnImport').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error('Array expected');
      mutate(() => {
        tracks.length = 0;
        imported.forEach(t => tracks.push(t));
        selection = null;
      });
      closePanel(false);
      showToast('Import 완료');
    } catch(err) {
      alert('JSON 파싱 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (!confirm('기본값으로 복원합니다. 현재 편집 내용은 Undo로 되돌릴 수 있습니다.')) return;
  mutate(() => {
    tracks.length = 0;
    DEFAULT_TRACKS.forEach(t => tracks.push(deepClone(t)));
    selection = null;
  });
  closePanel(false);
  showToast('초기화 완료');
});

document.getElementById('spClose').addEventListener('click', () => closePanel());

document.getElementById('addTrackBtn').addEventListener('click', () => {
  mutate(() => {
    const { start, end } = getViewRange();
    // Find the last index of a track within the active phase to insert after it
    let insertIdx = tracks.length;
    // Find the phase section and the next section
    let phaseSecIdx = -1;
    let nextSecIdx = tracks.length;
    for (let i = 0; i < tracks.length; i++) {
      if (tracks[i].type === 'section') {
        const lbl = (tracks[i].label || '').toUpperCase();
        if (activePhase === 'p1' && lbl.includes('PHASE 1')) phaseSecIdx = i;
        if (activePhase === 'p2' && lbl.includes('PHASE 2')) phaseSecIdx = i;
        else if (phaseSecIdx >= 0 && i > phaseSecIdx) { nextSecIdx = i; break; }
      }
    }
    if (phaseSecIdx >= 0) {
      insertIdx = nextSecIdx;
    }
    const newTrack = {
      label: '새 트랙',
      icon: '✨',
      cat: activePhase === 'p1' ? 'cat-sllm' : 'cat-ai',
      bars: [{s: start, e: Math.min(start + 2, end), c: activePhase === 'p1' ? 'c-blue' : 'c-purple', t: '새 작업'}],
      ms: []
    };
    tracks.splice(insertIdx, 0, newTrack);
    selection = {type:'track', trackIdx: insertIdx};
  });
  openPanel();
  showToast(`트랙 추가됨 (${activePhase.toUpperCase()})`);
});

// Phase tab clicks
document.querySelectorAll('.phase-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const p = tab.dataset.phase;
    if (p === activePhase) return;
    activePhase = p;
    saveViewPhase();
    document.querySelectorAll('.phase-tab').forEach(t => t.classList.toggle('active', t.dataset.phase === p));
    // Clear selection if it belongs to the other phase
    if (selection && selection.trackIdx != null) {
      // If selected track doesn't belong to new phase, clear
      closePanel();
    }
    renderTimeline();
    renderTracks();
  });
});

// ==============================================
// KEYBOARD SHORTCUTS
// ==============================================
function isTypingInField(target) {
  if (!target) return false;
  const tag = (target.tagName || '').toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
  if (target.isContentEditable) return true;
  return false;
}

document.addEventListener('keydown', (e) => {
  // Allow default behavior when typing in form fields (Ctrl+Z/C/V etc. on text inputs)
  const typing = isTypingInField(e.target);

  const mod = e.ctrlKey || e.metaKey;

  // Undo / Redo work globally (even while typing, so you can undo text changes too?)
  // Actually, for text fields, let browser handle its own undo. Only intercept when NOT typing.
  if (mod && !e.shiftKey && e.key.toLowerCase() === 'z') {
    if (typing) return; // let browser undo the text
    e.preventDefault();
    undo();
    return;
  }
  if ((mod && e.key.toLowerCase() === 'y') || (mod && e.shiftKey && e.key.toLowerCase() === 'z')) {
    if (typing) return;
    e.preventDefault();
    redo();
    return;
  }

  // Clipboard: only when an item is selected and not typing
  if (typing) return;

  if (mod && e.key.toLowerCase() === 'c') {
    if (selection) { e.preventDefault(); copySelection(); }
    return;
  }
  if (mod && e.key.toLowerCase() === 'x') {
    if (selection) { e.preventDefault(); cutSelection(); }
    return;
  }
  if (mod && e.key.toLowerCase() === 'v') {
    if (clipboard) { e.preventDefault(); pasteClipboard(); }
    return;
  }

  // Delete / Backspace when in edit mode and item selected
  if (editMode && selection && (e.key === 'Delete' || e.key === 'Backspace')) {
    e.preventDefault();
    deleteSelection();
    return;
  }

  // Escape closes panel
  if (e.key === 'Escape' && selection) {
    closePanel();
  }
});

// ==============================================
// INIT
// ==============================================
document.querySelectorAll('.phase-tab').forEach(t => t.classList.toggle('active', t.dataset.phase === activePhase));
renderTimeline();
renderTracks();
setStatus('saved');
updateUndoRedoButtons();
</script>
